# ====================================================
# frontend/nginx.conf
# ====================================================
# หน้าที่ nginx:
#   1. Serve static files (React ที่ build แล้ว)
#   2. Reverse proxy /api/* → backend (NestJS)
#
# 🙏 คำว่า "backend" ใน proxy_pass คือ service name
#    ใน docker-compose.yml — Docker DNS resolve ให้

events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # ----- REVERSE PROXY: ส่ง /api/* ไป backend -----
        location /api/ {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ----- SERVE STATIC: React frontend -----
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            # ถ้า route ไม่ตรงไฟล์ไหน → fallback /index.html
            # (จำเป็นสำหรับ SPA React เพราะ browser router
            #  ใช้ path แบบ /dashboard, /settings ไม่ใช่ไฟล์จริง)
        }
    }
}
