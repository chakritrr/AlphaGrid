version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DATABASE_URL=postgres://binquant:binquant@db:5432/binquant?sslmode=disable
      - JWT_SECRET=change-me-in-production
      - JWT_EXPIRATION_HOURS=72
      - ENVIRONMENT=development
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=binquant
      - POSTGRES_PASSWORD=binquant
      - POSTGRES_DB=binquant
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binquant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
